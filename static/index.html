<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superbot — Pocket FM</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#171717;--sb-h:#2a2a2a;--sb-b:#2e2e2e;--sb-t:#ececec;--sb-m:#8e8ea0;
  --bg:#212121;--ubg:#2f2f2f;--tx:#ececec;--tx2:#b4b4b4;--txm:#8e8ea0;
  --ac:#10a37f;--ac2:#0d8c6d;--bd:#2e2e2e;--ibg:#2f2f2f;--ib:#424242;
  --cbg:#1a1a1a;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6}

/* LAYOUT */
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;background:var(--sb);display:flex;flex-direction:column;border-right:1px solid var(--sb-b)}
.sb-head{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--sb-b)}
.sb-head img{width:26px;height:26px;border-radius:6px}
.sb-head h1{font-size:15px;font-weight:600;color:var(--sb-t)}
.btn-new{margin:10px 10px 6px;padding:10px 14px;background:0;border:1px solid var(--ib);border-radius:8px;color:var(--sb-t);font:500 13px/1 'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.btn-new:hover{background:var(--sb-h)}
.btn-new svg{width:15px;height:15px}
.sb-label{font:600 10px/1 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.08em;color:var(--sb-m);padding:14px 14px 6px}

/* Projects dropdown */
.proj-bar{padding:0 10px 4px;display:flex;gap:4px}
.proj-sel{flex:1;background:var(--ubg);border:1px solid var(--ib);border-radius:6px;color:var(--sb-t);font:400 12px 'Inter',sans-serif;padding:6px 8px;outline:0}
.proj-sel option{background:var(--sb)}
.proj-add{background:var(--ac);border:0;border-radius:6px;color:#fff;font:600 14px/1 'Inter',sans-serif;width:28px;cursor:pointer}
.proj-add:hover{background:var(--ac2)}

/* Chat list */
.chat-list{flex:1;overflow-y:auto;padding:4px 8px}
.ci{display:flex;align-items:center;padding:7px 10px;border-radius:8px;cursor:pointer;color:var(--sb-t);font-size:13px;transition:background .12s;margin-bottom:1px}
.ci:hover{background:var(--sb-h)}.ci.act{background:var(--sb-h)}
.ci-t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-x{opacity:0;background:0;border:0;color:var(--sb-m);cursor:pointer;font-size:13px;padding:2px 4px}
.ci:hover .ci-x{opacity:1}

/* Settings panel */
.sb-panel{padding:8px 12px}
.sb-panel label{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--sb-m);cursor:pointer;padding:4px 0}
.sb-panel input[type=checkbox]{accent-color:var(--ac)}

/* Footer */
.sb-foot{padding:10px 14px;border-top:1px solid var(--sb-b);font-size:11px;color:var(--sb-m)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;scroll-behavior:smooth;padding-bottom:140px}
.msg{padding:20px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.msg-in{max-width:768px;margin:0 auto;padding:0 24px;display:flex;gap:14px}
.av{width:28px;height:28px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-top:3px}
.av-u{background:#ab68ff;color:#fff;border-radius:50%}
.av-a{background:var(--ac);padding:4px}
.av-a img{width:20px;height:20px;border-radius:3px}
.mc{flex:1;min-width:0}
.mc p{margin-bottom:10px}.mc strong{font-weight:600}
.mc code{background:var(--cbg);padding:2px 5px;border-radius:4px;font-size:13px;font-family:'SF Mono',monospace}
.mc pre{background:var(--cbg);padding:14px;border-radius:8px;overflow-x:auto;font-size:13px;margin:10px 0}
.mc ul,.mc ol{padding-left:22px;margin-bottom:10px}.mc li{margin-bottom:3px}
.mc h1{font-size:18px;margin:14px 0 6px}.mc h2{font-size:16px;margin:12px 0 6px}.mc h3{font-size:14px;font-weight:600;margin:10px 0 4px}

/* Stage indicator */
.stage{font-size:12px;color:var(--ac);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.stage .dot{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Feedback */
.fb{display:flex;align-items:center;gap:5px;margin-top:10px}
.fb button{background:0;border:1px solid var(--ib);border-radius:6px;padding:3px 8px;cursor:pointer;color:var(--txm);font-size:13px;transition:all .15s}
.fb button:hover{background:var(--sb-h);color:var(--tx)}
.fb button.on{border-color:var(--ac);color:var(--ac)}
.fb .cpi-in{width:70px;background:var(--ibg);border:1px solid var(--ib);border-radius:6px;color:var(--tx);font-size:12px;padding:3px 6px;outline:0}
.fb .cpi-btn{font-size:11px;padding:3px 8px}

/* Tool log + draft */
.det{margin-top:8px;font-size:12px;color:var(--txm);background:var(--cbg);border-radius:6px;padding:8px 12px}
.det summary{cursor:pointer;font-weight:500}.det code{font-size:11px}

/* EMPTY STATE */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.empty img{width:48px;height:48px;border-radius:12px;margin-bottom:16px}
.empty h2{font-size:22px;font-weight:700;margin-bottom:4px}
.empty p{color:var(--txm);font-size:14px;margin-bottom:28px}
.sugs{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:560px;width:100%}
.sug{border:1px solid var(--bd);border-radius:10px;padding:12px 14px;cursor:pointer;transition:background .15s;text-align:left}
.sug:hover{background:var(--ubg)}
.sug b{font-size:13px;display:block;margin-bottom:2px}
.sug span{font-size:11px;color:var(--txm);line-height:1.4}

/* MODE SELECTOR */
.mode-bar{display:flex;gap:4px;flex-wrap:wrap;padding:0 4px;margin-bottom:2px}
.mode-btn{background:var(--ubg);border:1px solid var(--ib);border-radius:16px;padding:4px 12px;font:500 11px 'Inter',sans-serif;color:var(--txm);cursor:pointer;transition:all .15s;white-space:nowrap}
.mode-btn:hover{background:var(--sb-h);color:var(--tx)}
.mode-btn.active{background:var(--ac);border-color:var(--ac);color:#fff}

/* COMPARE */
.compare-bar{display:flex;gap:4px;padding:0 4px;margin-bottom:2px}
.compare-sel{flex:1;background:var(--ubg);border:1px solid var(--ib);border-radius:8px;color:var(--tx);font:400 11px 'Inter',sans-serif;padding:5px 8px;outline:0}
.compare-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;padding:20px 24px;max-width:1200px;margin:0 auto}
.compare-card{background:var(--ubg);border:1px solid var(--ib);border-radius:10px;padding:14px;overflow:auto;max-height:600px}
.compare-card h4{font-size:12px;color:var(--ac);margin-bottom:8px;font-weight:600}

/* MARKDOWN TABLES */
.mc table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.mc thead{background:var(--cbg)}
.mc th{text-align:left;padding:8px 10px;font-weight:600;border-bottom:2px solid var(--ib);white-space:nowrap}
.mc td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.06)}
.mc tr:hover td{background:rgba(255,255,255,.03)}
.mc table code{font-size:12px}

/* INPUT */
.ibar{position:absolute;bottom:0;left:0;right:0;padding:12px 24px 20px;background:linear-gradient(transparent,var(--bg) 30%)}
.ibar-in{max-width:768px;margin:0 auto;display:flex;flex-direction:column;gap:6px}
.ibar-row{display:flex;align-items:flex-end;gap:8px;background:var(--ibg);border:1px solid var(--ib);border-radius:22px;padding:6px 10px 6px 18px;transition:border-color .2s}
.ibar-row:focus-within{border-color:var(--ac)}
.ibar-row textarea{flex:1;background:0;border:0;outline:0;color:var(--tx);font:400 15px/1.5 'Inter',sans-serif;resize:none;max-height:200px;min-height:24px;padding:4px 0}
.ibar-row textarea::placeholder{color:var(--txm)}
/* File indicator */
.file-ind{display:flex;flex-wrap:wrap;gap:4px;padding:0 4px}
.file-chip{background:var(--ubg);border:1px solid var(--ib);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:4px}
.file-chip .rm{cursor:pointer;color:var(--txm);font-weight:700}
/* Buttons row */
.ibar-btns{display:flex;align-items:center;gap:6px}
.btn-attach{background:0;border:0;color:var(--txm);cursor:pointer;padding:4px;border-radius:6px;transition:color .15s}
.btn-attach:hover{color:var(--tx)}
.btn-attach svg{width:18px;height:18px}
.btn-send{width:32px;height:32px;border-radius:8px;background:var(--txm);border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.btn-send:disabled{background:#444;cursor:default}
.btn-send.go{background:var(--ac)}
.btn-send.go:hover{background:var(--ac2)}
.btn-send svg{width:16px;height:16px;color:var(--bg)}
.ibar-foot{text-align:center;font-size:10px;color:var(--txm)}

/* Hidden file input */
#fileInput{display:none}

/* Loading */
.ld{display:inline-flex;gap:4px}
.ld span{width:6px;height:6px;border-radius:50%;background:var(--txm);animation:bk 1.4s infinite}
.ld span:nth-child(2){animation-delay:.2s}.ld span:nth-child(3){animation-delay:.4s}
@keyframes bk{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Scrollbar */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:0}::-webkit-scrollbar-thumb{background:#444;border-radius:3px}

/* LOGIN */
.login-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center}
.login-box{background:var(--ubg);border:1px solid var(--ib);border-radius:16px;padding:40px 36px;max-width:380px;width:90%;text-align:center}
.login-box img{width:56px;height:56px;border-radius:14px;margin-bottom:16px}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:4px}
.login-box p{color:var(--txm);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;background:var(--ibg);border:1px solid var(--ib);border-radius:10px;color:var(--tx);font:400 14px 'Inter',sans-serif;padding:12px 14px;outline:0;margin-bottom:12px;transition:border-color .2s}
.login-box input:focus{border-color:var(--ac)}
.login-box button{width:100%;padding:12px;background:var(--ac);border:0;border-radius:10px;color:#fff;font:600 14px 'Inter',sans-serif;cursor:pointer;transition:background .15s}
.login-box button:hover{background:var(--ac2)}
.login-err{color:#ef4444;font-size:12px;margin-bottom:8px;min-height:18px}

@media(max-width:768px){
  .sidebar{position:absolute;z-index:100;transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .ibar{left:0}
  .sugs{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <span style="font-size:48px">🤖</span>
    <h2>Superbot</h2>
    <p>Sign in to continue</p>
    <div class="login-err" id="loginErr"></div>
    <input type="text" id="loginUser" placeholder="Username" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Sign in</button>
  </div>
</div>
<div class="app" id="appMain" style="display:none">
<aside class="sidebar" id="sidebar">
  <div class="sb-head">
    <span style="font-size:24px">🤖</span>
    <h1>Superbot</h1>
  </div>
  <button class="btn-new" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New chat
  </button>

  <div class="sb-label">Project</div>
  <div class="proj-bar">
    <select class="proj-sel" id="projSel" onchange="switchProject()"><option value="">All chats</option></select>
    <button class="proj-add" onclick="createProject()" title="New project">+</button>
  </div>

  <div class="sb-label">Recent</div>
  <div class="chat-list" id="chatList"></div>

  <div class="sb-label">Settings</div>
  <div class="sb-panel">
    <label><input type="checkbox" id="twoPassToggle" checked> Two-pass (draft + critique)</label>
    <label style="margin-top:8px;flex-direction:column;align-items:flex-start;gap:4px">
      <span>Model</span>
      <select id="modelSel" style="width:100%;background:var(--ubg);border:1px solid var(--ib);border-radius:6px;color:var(--sb-t);font:400 12px 'Inter',sans-serif;padding:6px 8px;outline:0">
        <option value="">Default (Gemini 2.5 Flash)</option>
      </select>
    </label>
    <label style="margin-top:8px;flex-direction:column;align-items:flex-start;gap:4px">
      <span>Show filter</span>
      <select id="showFilter" style="width:100%;background:var(--ubg);border:1px solid var(--ib);border-radius:6px;color:var(--sb-t);font:400 12px 'Inter',sans-serif;padding:6px 8px;outline:0">
        <option value="">All shows</option>
      </select>
    </label>
  </div>

  <div class="sb-foot" id="sbFoot">Loading...</div>
</aside>

<div class="main">
  <div class="msgs" id="msgs"></div>
  <div class="ibar">
    <div class="ibar-in">
      <div class="mode-bar" id="modeBar">
        <button class="mode-btn active" data-mode="" onclick="setMode(this,'')">Auto</button>
        <button class="mode-btn" data-mode="opening" onclick="setMode(this,'opening')">Opening</button>
        <button class="mode-btn" data-mode="q1" onclick="setMode(this,'q1')">Q1 Script</button>
        <button class="mode-btn" data-mode="base" onclick="setMode(this,'base')">Base Script</button>
        <button class="mode-btn" data-mode="merge" onclick="setMode(this,'merge')">Script Merge</button>
        <button class="mode-btn" data-mode="cliffhanger" onclick="setMode(this,'cliffhanger')">Cliffhanger</button>
        <button class="mode-btn" data-mode="super" onclick="setMode(this,'super')">SuperAgent</button>
        <button class="mode-btn" style="margin-left:auto;background:var(--ac);border-color:var(--ac);color:#fff" id="compareBtn" onclick="toggleCompare()">Compare</button>
      </div>
      <div class="compare-bar" id="compareBar" style="display:none">
        <select id="compareModel1" class="compare-sel"><option value="">Model 1</option></select>
        <select id="compareModel2" class="compare-sel"><option value="">Model 2</option></select>
        <select id="compareModel3" class="compare-sel"><option value="">(optional) Model 3</option></select>
      </div>
      <div class="file-ind" id="fileInd"></div>
      <div class="ibar-row">
        <button class="btn-attach" onclick="document.getElementById('fileInput').click()" title="Attach files">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea id="inp" placeholder="Message Superbot..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
          oninput="ar(this);ts()"></textarea>
        <button class="btn-send" id="sendBtn" onclick="send()" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="ibar-foot">Superbot uses Gemini + your historical ad data. Always verify metrics.</div>
    </div>
  </div>
  <input type="file" id="fileInput" multiple accept=".txt,.md,.csv,.json,.docx,.pdf,.xlsx,.xls,.srt,.png,.jpg,.jpeg,.webp" onchange="handleFiles(this.files)">
</div>
</div>

<script>
let chatId=null,busy=false,files=[],currentMode='';
const PFM='🤖';
const $=s=>document.getElementById(s);
const api=(p,o={})=>fetch(p,{headers:{'Content-Type':'application/json'},...o}).then(r=>r.json());

// ── Mode selector ──
function setMode(btn,mode){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>{if(b.id!=='compareBtn')b.classList.remove('active')});
  btn.classList.add('active');
}

let compareMode=false;
function toggleCompare(){
  compareMode=!compareMode;
  $('compareBar').style.display=compareMode?'flex':'none';
  $('compareBtn').style.opacity=compareMode?'1':'0.6';
}

// ── Load models ──
async function loadModels(){
  try{
    const models=await api('/api/models');
    const sels=[$('modelSel'),$('compareModel1'),$('compareModel2'),$('compareModel3')];
    for(const sel of sels){
      const first=sel.options[0];
      sel.innerHTML='';sel.appendChild(first);
      for(const m of models){
        const o=document.createElement('option');o.value=m.id;o.textContent=m.name;sel.appendChild(o);
      }
    }
  }catch(e){console.warn('Failed to load models',e)}
}

// ── Login ──
function checkAuth(){
  if(sessionStorage.getItem('sb_auth')){
    $('loginOverlay').style.display='none';
    $('appMain').style.display='flex';
    return true;
  }
  return false;
}
async function doLogin(){
  const user=$('loginUser').value.trim(),pass=$('loginPass').value;
  $('loginErr').textContent='';
  if(!user||!pass){$('loginErr').textContent='Enter username and password';return}
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    const d=await r.json();
    if(d.ok){sessionStorage.setItem('sb_auth',user);checkAuth();init()}
    else{$('loginErr').textContent=d.error||'Invalid credentials'}
  }catch(e){$('loginErr').textContent='Connection error'}
}
if(checkAuth()){/* already logged in */}

// ── Init ──
async function init(){loadProjects();loadChats();loadStats();loadShows();loadModels();showEmpty()}
async function loadStats(){
  try{const s=await api('/api/stats');$('sbFoot').innerHTML=`${s.total_assets} ads &middot; ${s.total_briefs} briefs &middot; ${s.total_shows} shows`}catch(e){}
}
async function loadShows(){
  try{
    const shows=await api('/api/shows');const sel=$('showFilter');
    sel.innerHTML='<option value="">All shows</option>';
    shows.forEach(s=>{const o=document.createElement('option');o.value=s.slug;o.textContent=s.name||s.slug;sel.appendChild(o)});
  }catch(e){}
}
async function loadProjects(){
  try{
    const ps=await api('/api/projects');const sel=$('projSel');
    const cur=sel.value;sel.innerHTML='<option value="">All chats</option>';
    ps.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;sel.appendChild(o)});
    sel.value=cur;
  }catch(e){}
}
async function loadChats(){
  try{
    const pid=$('projSel').value;const url=pid?`/api/chats?project_id=${pid}`:'/api/chats';
    const cs=await api(url);$('chatList').innerHTML=cs.map(c=>`
      <div class="ci ${c.id===chatId?'act':''}" onclick="openChat('${c.id}')">
        <span class="ci-t">${esc(c.title||'Untitled')}</span>
        <button class="ci-x" onclick="event.stopPropagation();delChat('${c.id}')">&#x2715;</button>
      </div>`).join('');
  }catch(e){}
}
function switchProject(){loadChats()}

async function createProject(){
  const name=prompt('Project name:');
  if(!name||!name.trim())return;
  await api('/api/projects',{method:'POST',body:JSON.stringify({name:name.trim()})});
  await loadProjects();
}

function newChat(){chatId=null;files=[];renderFiles();showEmpty();loadChats()}

function showEmpty(){
  $('msgs').innerHTML=`
  <div class="empty">
    <span style="font-size:48px">${PFM}</span>
    <h2>Superbot</h2>
    <p>Data-backed ad script generation for Pocket FM</p>
    <div class="sugs">
      <div class="sug" onclick="use('Show me the 10 best-performing hooks and what makes them crack')"><b>Top performers</b><span>Best hooks by CPI + structural analysis</span></div>
      <div class="sug" onclick="use('Write a 2-min Q1 opening script for The Alpha\\'s Bride targeting sub-$2.50 CPI')"><b>Write a Q1</b><span>Full opening script for a show</span></div>
      <div class="sug" onclick="use('What do all sub-$2.00 CPI hooks have in common? Show structural DNA with examples.')"><b>Pattern analysis</b><span>What makes winning hooks work</span></div>
      <div class="sug" onclick="use('Which writers hit under $2.50 CPI consistently? Show their best work.')"><b>Writer stats</b><span>Leaderboard + portfolio analysis</span></div>
    </div>
  </div>`;
}

async function openChat(id){
  chatId=id;
  try{
    const c=await api(`/api/chats/${id}`);$('msgs').innerHTML='';
    c.messages.forEach(m=>addMsg(m.role,m.content,m.tool_log,m.draft,m.critique));
    scroll();loadChats();
  }catch(e){}
}

async function delChat(id){
  await api(`/api/chats/${id}`,{method:'DELETE'});
  if(chatId===id)newChat();loadChats();
}

// ── Files ──
async function handleFiles(fileList){
  for(const f of fileList){
    const fd=new FormData();fd.append('file',f);
    try{
      const r=await fetch('/api/upload',{method:'POST',body:fd}).then(r=>r.json());
      files.push({name:r.name,type:r.type,text:r.text,chars:r.char_count});
    }catch(e){files.push({name:f.name,type:'error',text:'upload failed',chars:0})}
  }
  renderFiles();$('fileInput').value='';
}
function renderFiles(){
  $('fileInd').innerHTML=files.map((f,i)=>`<div class="file-chip">${esc(f.name)} (${(f.chars/1000).toFixed(1)}k) <span class="rm" onclick="files.splice(${i},1);renderFiles()">x</span></div>`).join('');
}

// ── Send ──
async function send(){
  const inp=$('inp'),txt=inp.value.trim();if(!txt||busy)return;
  busy=true;inp.value='';ar(inp);ts();

  // Remove empty state
  const em=$('msgs').querySelector('.empty');if(em)em.remove();
  addMsg('user',txt);scroll();

  // Compare mode
  if(compareMode){
    const models=[
      $('compareModel1').value,$('compareModel2').value,$('compareModel3').value
    ].filter(Boolean);
    if(models.length<2){addMsg('assistant','Select at least 2 models to compare.');busy=false;return}
    await sendCompare(txt,models);
    busy=false;files=[];renderFiles();
    return;
  }

  // Build file context
  let fileCtx='';
  if(files.length){fileCtx=files.map(f=>`[ATTACHED FILE: ${f.name} (${f.type})]\n${f.text}`).join('\n\n')}
  const showVal=$('showFilter').value;
  if(showVal){fileCtx=`[SHOW FILTER: Focus on show "${showVal}"]\n\n`+(fileCtx||'')}

  // Loading with stage indicator
  const ld=document.createElement('div');ld.className='msg';ld.id='ldMsg';
  ld.innerHTML=`<div class="msg-in"><div class="av av-a">${PFM}</div><div class="mc"><div class="stage" id="stageText"><div class="dot"></div> Thinking...</div><div class="ld"><span></span><span></span><span></span></div></div></div>`;
  $('msgs').appendChild(ld);scroll();

  const twoPass=$('twoPassToggle').checked;
  const projId=$('projSel').value||null;

  try{
    // Use SSE for stage updates
    const resp=await fetch('/api/chat/stream',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:txt,chat_id:chatId,project_id:projId,two_pass:twoPass,file_context:fileCtx||null,mode:currentMode||null,model:$('modelSel').value||null})
    });
    const reader=resp.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const d=JSON.parse(line.slice(6));
          if(d.stage){const st=$('stageText');if(st)st.innerHTML=`<div class="dot"></div> ${esc(d.stage)}`}
          if(d.done){
            ld.remove();chatId=d.chat_id;
            addMsg('assistant',d.response,d.tool_log,d.draft,d.critique);scroll();loadChats();
          }
          if(d.error){ld.remove();addMsg('assistant','Error: '+d.error);scroll()}
        }catch(e){}
      }
    }
  }catch(e){ld.remove();addMsg('assistant','Error: '+e.message);scroll()}
  busy=false;files=[];renderFiles();
}

function use(t){$('inp').value=t;ar($('inp'));ts();send()}

// ── Compare ──
async function sendCompare(txt,models){
  let fileCtx='';
  if(files.length){fileCtx=files.map(f=>`[ATTACHED FILE: ${f.name} (${f.type})]\n${f.text}`).join('\n\n')}
  const showVal=$('showFilter').value;
  if(showVal){fileCtx=`[SHOW FILTER: Focus on show "${showVal}"]\n\n`+(fileCtx||'')}

  const ld=document.createElement('div');ld.className='msg';ld.id='ldMsg';
  ld.innerHTML=`<div class="msg-in"><div class="av av-a">${PFM}</div><div class="mc"><div class="stage" id="stageText"><div class="dot"></div> Comparing ${models.length} models...</div><div class="ld"><span></span><span></span><span></span></div></div></div>`;
  $('msgs').appendChild(ld);scroll();

  try{
    const resp=await fetch('/api/compare',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:txt,models,mode:currentMode||null,file_context:fileCtx||null})
    });
    const reader=resp.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const d=JSON.parse(line.slice(6));
          if(d.stage){const st=$('stageText');if(st)st.innerHTML=`<div class="dot"></div> ${esc(d.stage)}`}
          if(d.done){
            ld.remove();
            // Render compare results
            const results=d.results;
            const div=document.createElement('div');div.className='msg';
            let cards='';
            for(const[mid,r] of Object.entries(results)){
              const name=mid.split('/').pop();
              cards+=`<div class="compare-card"><h4>${esc(name)}</h4><div class="mc">${md(r.response)}</div></div>`;
            }
            div.innerHTML=`<div class="msg-in"><div class="av av-a">${PFM}</div><div class="mc"><strong>Compare Results</strong><div class="compare-results">${cards}</div></div></div>`;
            $('msgs').appendChild(div);scroll();
          }
          if(d.error){ld.remove();addMsg('assistant','Error: '+d.error);scroll()}
        }catch(e){}
      }
    }
  }catch(e){ld.remove();addMsg('assistant','Error: '+e.message);scroll()}
}

// ── Messages ──
function addMsg(role,content,tlog,draft,critique){
  const d=document.createElement('div');d.className='msg';
  const av=role==='user'?'<div class="av av-u">U</div>':`<div class="av av-a">${PFM}</div>`;
  let extra='';
  if(tlog&&tlog.length){
    const items=tlog.map(t=>`<code>${t.tool}(${Object.entries(t.args||{}).map(([k,v])=>k+'='+JSON.stringify(v)).join(', ')})</code>`).join('<br>');
    extra+=`<details class="det"><summary>Tools called (${tlog.length})</summary>${items}</details>`;
  }
  if(draft&&critique&&draft!==content){
    extra+=`<details class="det"><summary>Draft + Critique (two-pass)</summary><b>Draft:</b><br>${esc((draft||'').substring(0,1500))}<br><br><b>Critique:</b><br>${esc((critique||'').substring(0,1500))}</details>`;
  }
  if(role==='assistant'){
    extra+=`<div class="fb"><button onclick="fb(this,'up')">&#128077;</button><button onclick="fb(this,'down')">&#128078;</button><input class="cpi-in" type="number" step="0.1" min="0" placeholder="CPI"><button class="cpi-btn" onclick="logCpi(this)">Log CPI</button></div>`;
  }
  d.innerHTML=`<div class="msg-in">${av}<div class="mc">${role==='user'?esc(content):md(content)}${extra}</div></div>`;
  $('msgs').appendChild(d);
}

function scroll(){const m=$('msgs');m.scrollTop=m.scrollHeight}

// ── Feedback ──
async function fb(btn,rating){
  btn.classList.add('on');
  try{await api('/api/feedback',{method:'POST',body:JSON.stringify({chat_id:chatId||'',msg_idx:0,rating})})}catch(e){}
}
async function logCpi(btn){
  const inp=btn.previousElementSibling;const v=parseFloat(inp.value);if(!v)return;
  btn.textContent='Logged';btn.disabled=true;
  try{await api('/api/feedback',{method:'POST',body:JSON.stringify({chat_id:chatId||'',msg_idx:0,rating:'cpi_logged',actual_cpi:v})})}catch(e){}
}

// ── Helpers ──
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,200)+'px'}
function ts(){const b=$('sendBtn'),has=$('inp').value.trim();b.disabled=!has;b.className=has?'btn-send go':'btn-send'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function mdTable(block){
  // Parse a markdown table block into HTML
  const rows=block.trim().split('\n').filter(r=>r.trim());
  if(rows.length<2)return block;
  const parse=r=>r.replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim());
  const hdr=parse(rows[0]);
  // Skip separator row (row[1] is dashes)
  const body=rows.slice(2).map(parse);
  let html='<table><thead><tr>'+hdr.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>';
  for(const row of body){html+='<tr>'+row.map(c=>`<td>${c}</td>`).join('')+'</tr>'}
  html+='</tbody></table>';
  return html;
}
function md(t){
  if(!t)return'';
  // Extract tables before escaping
  const tables=[];
  t=t.replace(/((?:^\|.+\|[ ]*\n){2,}(?:^\|.+\|[ ]*$\n?)*)/gm,(m)=>{
    tables.push(m);return`__TBL${tables.length-1}__`;
  });
  let h=esc(t);
  // Restore tables (rendered as HTML)
  for(let i=0;i<tables.length;i++){h=h.replace(`__TBL${i}__`,mdTable(tables[i]))}
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/```[\w]*\n([\s\S]*?)```/g,'<pre>$1</pre>');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/^\- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h=h.replace(/\n\n/g,'</p><p>');h=h.replace(/\n/g,'<br>');
  h='<p>'+h+'</p>';
  h=h.replace(/(<li>.*?<\/li>)+/gs,m=>`<ul>${m}</ul>`);
  return h;
}
